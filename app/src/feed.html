<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <title>Curiosity Cat — Feed</title>
  <link rel="stylesheet" href="css/app.css" />
</head>
<body>
  <h1>🔔 The Feed</h1>
  <p class="subtitle">
    Live Watcher stream — one human sentence per event, coloured by verdict.
    A denied event ("a block") renders as the full Meow-spec three
    sentences: what the cat tried, why the fence said no, what to do if you
    disagree.
  </p>

  <div class="card">
    <p class="status-line" id="status">Loading…</p>
    <div id="feed-list"></div>
  </div>

  <script src="js/sidecar-client.js"></script>
  <script src="js/tray-state.js"></script>
  <script src="js/feed.js"></script>
</body>
</html>
